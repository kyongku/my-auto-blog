name: Daily Auto Post
on:
  schedule:
    - cron: '0 23 * * *' # 한국 시간 매일 아침 8시 (UTC 23시)
  workflow_dispatch: # 직접 버튼 눌러서 실행 가능하게 설정

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright google-generativeai
          playwright install chromium

      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TISTORY_SESSION: ${{ secrets.TISTORY_SESSION }}
          TISTORY_BLOG_NAME: ${{ secrets.TISTORY_BLOG_NAME }}
        run: python main.py
