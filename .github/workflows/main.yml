name: Daily Auto Post
on:
  schedule:
    - cron: '0 23 * * *' # 한국 시간 매일 아침 8시
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # 최신 라이브러리 대응을 위해 3.11 권장

      - name: Install dependencies
        run: |
          pip install playwright google-genai
          playwright install chromium

      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TISTORY_SESSION: ${{ secrets.TISTORY_SESSION }}
          TISTORY_BLOG_NAME: ${{ secrets.TISTORY_BLOG_NAME }}
        run: python main.py
