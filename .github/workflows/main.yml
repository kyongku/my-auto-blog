name: Daily Auto Post
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v3 -> v4 업데이트 (Node.js 경고 해결)

      - name: Set up Python
        uses: actions/setup-python@v5 # v4 -> v5 업데이트 (Node.js 경고 해결)
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright google-genai
          playwright install chromium

      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TISTORY_SESSION: ${{ secrets.TISTORY_SESSION }}
          TISTORY_BLOG_NAME: ${{ secrets.TISTORY_BLOG_NAME }}
        run: python main.py
